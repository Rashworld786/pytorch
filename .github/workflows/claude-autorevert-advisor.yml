name: Claude Autorevert Advisor

on:
  workflow_dispatch:
    inputs:
      suspect_commit:
        description: "SHA of the commit autorevert suspects caused the failure"
        required: true
        type: string
      pr_number:
        description: "PR number of the suspect commit"
        required: true
        type: string
      signal_pattern:
        description: "JSON object with signal metadata and a commits[] array (each labeled failed/unknown/successful/prior, with events[] carrying job links, log URLs, and per-test outcome rows for TEST signals)"
        required: true
        type: string

jobs:
  analyze:
    if: github.repository == 'pytorch/pytorch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: bedrock
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout pytorch/pytorch trunk
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 128

      - name: Fetch suspect commit
        run: |
          git fetch origin ${{ inputs.suspect_commit }} --depth=32 || true

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::308535385114:role/gha_workflow_claude_code
          aws-region: us-east-1

      - name: Run AI Advisor
        id: claude
        uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1.0.89
        with:
          allowed_bots: "pytorch-auto-revert[bot],pytorch-bot[bot]"
          use_bedrock: "true"
          claude_args: |
            --model global.anthropic.claude-opus-4-6-v1
            --allowedTools "Bash,Read,Glob,Grep,WebFetch"
            --json-schema '{"type":"object","required":["verdict","confidence","summary","causal_reasoning"],"properties":{"verdict":{"type":"string","enum":["revert","unsure","not_related","garbage"]},"confidence":{"type":"number","minimum":0,"maximum":1},"summary":{"type":"string","description":"1-3 sentence explanation of the verdict"},"causal_reasoning":{"type":"string","description":"Detailed explanation of the causal chain (or lack thereof) between the code change and the observed failures"}}}'
          settings: '{"alwaysThinkingEnabled": true}'
          prompt: |
            You are an AI advisor for PyTorch's autorevert system. Your job is to analyze a suspect commit and CI failures to determine whether the commit caused the failures.

            ## Context

            **Suspect commit:** ${{ inputs.suspect_commit }}
            **PR:** https://github.com/pytorch/pytorch/pull/${{ inputs.pr_number }}

            **Signal pattern (partition data from autorevert):**
            ```json
            ${{ inputs.signal_pattern }}
            ```

            The signal pattern contains:
            - `signal_key`: the **authoritative** identifier of the specific failure on this signal (test path or job name). Treat it as ground truth — every event in the failed partition is a job that exhibits this exact failure. You do NOT need to re-derive which test/job failed from logs; signal extraction has already done so.
            - `signal_source`: `"test"` (individual test) or `"job"` (whole job).
            - `workflow_name`: the CI workflow where this signal lives.
            - `commits[]`: an array of commits with a `partition` label and an `events[]` array of CI observations. Partition labels:
              - `"failed"` — commits where this signal FAILS, at or after the suspect commit (newest first). The suspect commit is marked with `is_suspect: true`.
              - `"successful"` — baseline commits where this signal was GREEN before the suspect commit. These prove the signal was passing.
              - `"unknown"` — commits between failed and successful with no resolved events (pending or missing data).
              - `"prior"` — older commits before the successful baseline. The signal may have been fixed and then failed again here; do not assume causation from prior failures.
            - `events[].status`: `"failure"` / `"success"` / `"pending"`. Each event also includes `job_id`, `wf_run_id`, `run_attempt`, `started_at`, and (when `job_id` is set) `url` and `log_url`.
            - `events[].test_failures` (TEST signals only, when available): a list of `{file, classname, name, failure_runs, success_runs}` rows from `tests.all_test_runs`, attached to the event by `job_id`. These land in ClickHouse **before** the parent `workflow_job` reaches `completed`, so they are usable evidence even when the event's `status` is `"pending"` or its `log_url` is empty.

            The signal extraction is ground truth: the signal transitioned from SUCCESS to FAILURE at the suspect commit. Your job is to determine whether the CODE CHANGE caused the transition, or whether it's coincidence (upstream dependency change, flaky environment, infra issue).

            ## Reasoning principles

            Two principles dominate the failure modes of this advisor. Apply them to every verdict.

            *Dual-purpose context.* This advisor runs in two modes — trunk autorevert dispatch and PR-time review. The evidence rules below apply identically in both modes; references to autorevert dispatch, peer commits, the `failed` partition, and signal suppression describe the trunk consequence, not a different reasoning standard.

            **Principle 1 — Mid-flight state is normal; absence of completed evidence is not evidence of failure.** This advisor is dispatched the moment a `failure` is observed on the suspect commit. At that moment, peer commits' jobs for the same signal are typically still running and appear as `events[].status = "pending"`. A `pending` event means *"this job has not finished yet"* — nothing more. It is NOT evidence of failure, NOT evidence of flake, NOT evidence of a stuck/hanging/infra-broken job. The `failed` partition will often be mostly pending; this is expected. Empty `log_url` on a pending event is the ABSENCE of evidence, not evidence of absence. Only events with `status: "failure"` / `status: "success"` (and `events[].test_failures` rows, which land in ClickHouse before `workflow_job` reaches `completed`) carry diagnostic signal. When completed status/log evidence is scarce *and* `test_failures` rows plus code tracing do not establish causality, the correct verdict is `unsure` — never `garbage` from pending-only data, and never described as "stuck" or "hanging".

            **Principle 2 — Causal-chain identifier matches must be structural.** When your reasoning rests on matching one identifier against another — `signal_key` against a marker file under `test/dynamo_expected_failures/<...>`, a failing test against an `expected_failures`/`expected_skips` table entry, a method name against an `@xfail`/`@skip` decorator, or any similar artifact — the match must be STRUCTURAL: full module + class + method (or full namespaced identifier), not bare leaf name. Bare-name overlap across class/module boundaries is coincidence, not evidence. Example: `TestMisc.test_foo` (marker) and `test_linalg.py::TestLinalg.test_foo` (failing test) are different tests despite the shared method name. If the structural identifier does not match, reject *that identifier-based chain*; consider `revert` only if a separate, structurally valid causal chain remains. Otherwise prefer `not_related` over `revert`.

            ## Investigation Steps

            1. **Read the suspect commit diff.** `git show ${{ inputs.suspect_commit }}` and read the modified files for context.
            2. **Analyze the PR.** `gh pr view ${{ inputs.pr_number }} --repo pytorch/pytorch --json title,body,files` to understand intent.
            3. **Investigate completed failed evidence.** For each event with `status: "failure"` in the failed partition: fetch `log_url`, identify the failing test/build step, read the test source. For TEST signals, also inspect `events[].test_failures` (usable even on pending events per Principle 1). Skip pending events ONLY for job-outcome/status inference — still read their `events[].test_failures` rows for test identity and failure details.
            4. **Trace the causal chain.** Imports, call paths, class hierarchies, runtime dispatch, indirect dependencies (utility changes can break tests through several layers), runtime behavior (tensor ops, kernel dispatch, autograd, compile paths). Check whether the error / stack trace references the changed code, even indirectly. When the chain rests on an artifact identifier, apply Principle 2.
            5. **Check for alternative explanations.** Known flaky test (skip/xfail decorators, recent similar failures elsewhere). Infra (OOM, timeout, network, GPU driver). Concurrent commit (timestamps + other recent merges). Signal unreliability (persistent timeouts, environment-dependent flakes, resource exhaustion not caused by any code change).
            6. **Render your verdict.**
               - `revert` — plausible causal chain (direct or indirect, but structurally traceable) from the code change to the failure. Confidence reflects how direct and clear the chain is. (Subject to Principle 2: name-only chains do not qualify.)
               - `not_related` — no plausible causal chain after thorough investigation; the failure has a clear alternative explanation.
               - `unsure` — investigation is inconclusive. Also the default when completed evidence is scarce per Principle 1.
               - `garbage` — the signal itself is unreliable; suppress for ~2 hours. Use ONLY with concrete infra evidence in a COMPLETED job's log: HTTP error codes from dependency mirrors, ECR/docker pull failures with specific messages, runner pool exhaustion, GPU driver crash signatures, OOM kills in dmesg. Per Principle 1, NEVER `garbage` based on pending events or empty pending logs.

            When in doubt between `unsure` and `not_related`, prefer `unsure`. When in doubt between `garbage` and `unsure`, prefer `unsure`. A false `not_related` can prematurely dismiss a real regression; an `unsure` just lets autorevert continue its normal restart-to-confirm flow. A false `garbage` suppresses the signal for ~2h and may delay a legitimate revert. A false `revert` from a name-only chain costs reverting a clean PR.

            IMPORTANT: Be thorough. Read actual code. Trace actual call paths. Do not guess based on file names alone.

      - name: Save verdict artifact
        if: always() && steps.claude.outputs.structured_output != ''
        env:
          VERDICT_JSON: ${{ steps.claude.outputs.structured_output }}
        run: |
          mkdir -p /tmp/verdict
          printf '%s' "$VERDICT_JSON" > /tmp/verdict/verdict.json
          cat /tmp/verdict/verdict.json

      - name: Upload verdict artifact
        if: always() && steps.claude.outputs.structured_output != ''
        uses: actions/upload-artifact@v4
        with:
          name: autorevert-verdict
          path: /tmp/verdict/verdict.json
          retention-days: 30

      - name: Upload verdict to S3 for ClickHouse ingestion
        if: always() && steps.claude.outputs.structured_output != ''
        env:
          VERDICT_JSON: ${{ steps.claude.outputs.structured_output }}
          SIGNAL_PATTERN: ${{ inputs.signal_pattern }}
        run: |
          # Build enriched verdict JSON with signal metadata for CH ingestion
          jq -n \
            --arg repo "${{ github.repository }}" \
            --argjson run_id "${{ github.run_id }}" \
            --argjson run_attempt "${{ github.run_attempt }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.000)" \
            --arg suspect_commit "${{ inputs.suspect_commit }}" \
            --argjson pr_number "${{ inputs.pr_number }}" \
            --arg signal_key "$(echo "$SIGNAL_PATTERN" | jq -r '.signal_key // ""')" \
            --arg signal_source "$(echo "$SIGNAL_PATTERN" | jq -r '.signal_source // ""')" \
            --arg workflow_name "$(echo "$SIGNAL_PATTERN" | jq -r '.workflow_name // ""')" \
            --arg verdict "$(echo "$VERDICT_JSON" | jq -r '.verdict // ""')" \
            --argjson confidence "$(echo "$VERDICT_JSON" | jq -r '.confidence // 0')" \
            --arg summary "$(echo "$VERDICT_JSON" | jq -r '.summary // ""')" \
            --arg causal_reasoning "$(echo "$VERDICT_JSON" | jq -r '.causal_reasoning // ""')" \
            '{
              repo: $repo,
              run_id: $run_id,
              run_attempt: $run_attempt,
              timestamp: $timestamp,
              suspect_commit: $suspect_commit,
              pr_number: $pr_number,
              signal_key: $signal_key,
              signal_source: $signal_source,
              workflow_name: $workflow_name,
              verdict: $verdict,
              confidence: $confidence,
              summary: $summary,
              causal_reasoning: $causal_reasoning
            }' > /tmp/advisor_verdict.json

          aws s3 cp /tmp/advisor_verdict.json \
            "s3://ossci-raw-job-status/autorevert_advisor_verdicts/${{ github.repository }}/${{ github.run_id }}_${{ github.run_attempt }}.json"

      - name: Upload usage metrics
        if: always()
        uses: pytorch/test-infra/.github/actions/upload-claude-usage@main
